application:
  name: RootCauseAnalysisAgent
  version: "0.1.0"


workspace:
  directory: workspace


output:
  directory: output


logs:
  directory: logs


archive:
  supported_extensions:
    - ".tar"
    - ".tar.gz"
    - ".tgz"


extraction:
  recursive: true


log_discovery:
  target_directory: "nvram2/log"


ai:
  enabled: false
  provider: openai
  model: gpt-5.5
